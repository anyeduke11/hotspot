[pytest]
markers =
    unit: Pure unit test — no DB, no network, isolated single class/function
    integration: Cross-layer test — DB + service + API, no external network
    e2e: Full end-to-end — complete workflow across routers + DB + business logic
    slow: Long-running test (> 5s)

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

testpaths = backend/tests
python_files = test_*.py
